<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>CAC - Consulta de Precatórios</title>
</head>
<body>
    <form method="post" action="/cac/scp">
        <input type="hidden" name="__VIEWSTATE" id="__VIEWSTATE" value="MOCK_VIEWSTATE" />
        <input type="hidden" name="__VIEWSTATEGENERATOR" id="__VIEWSTATEGENERATOR" value="MOCK_VIEWSTATEGENERATOR" />
        <input type="hidden" name="__EVENTVALIDATION" id="__EVENTVALIDATION" value="MOCK_EVENTVALIDATION" />
        <div class="form-group">
            <label for="numeroPrecatorio">Número do Precatório:</label>
            <input type="text" id="numeroPrecatorio" name="numeroPrecatorio" />
        </div>
        <button type="submit">Consultar</button>
    </form>
</body>
</html>
